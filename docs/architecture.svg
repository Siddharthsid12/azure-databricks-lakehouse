<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bronzeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#92400e"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="silverGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a16207"/>
      <stop offset="100%" stop-color="#854d0e"/>
    </linearGradient>
    <linearGradient id="qualityGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#166534"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="azureGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0078d4"/>
      <stop offset="100%" stop-color="#00a4ef"/>
    </linearGradient>
    <linearGradient id="cicdGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="820" fill="url(#bgGrad)" rx="12"/>
  
  <!-- Title -->
  <text x="600" y="42" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700" letter-spacing="1">AZURE DATABRICKS LAKEHOUSE — ARCHITECTURE</text>
  <text x="600" y="64" text-anchor="middle" fill="#94a3b8" font-size="13" letter-spacing="2">MEDALLION ARCHITECTURE  ·  STAR SCHEMA  ·  SCD TYPE 2  ·  CI/CD</text>

  <!-- ═══════════ DATA SOURCES (top) ═══════════ -->
  <text x="600" y="100" text-anchor="middle" fill="#64748b" font-size="11" font-weight="600" letter-spacing="3">DATA SOURCES</text>
  
  <!-- CSV -->
  <rect x="200" y="112" width="160" height="58" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="280" y="137" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">CSV FILES</text>
  <text x="280" y="155" text-anchor="middle" fill="#64748b" font-size="10">Customers · Orders</text>

  <!-- JSON -->
  <rect x="520" y="112" width="160" height="58" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="600" y="137" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">JSON FILES</text>
  <text x="600" y="155" text-anchor="middle" fill="#64748b" font-size="10">Products Catalog</text>

  <!-- REST API -->
  <rect x="840" y="112" width="160" height="58" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="920" y="137" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">REST API</text>
  <text x="920" y="155" text-anchor="middle" fill="#64748b" font-size="10">External Sources</text>

  <!-- Arrows from sources down -->
  <line x1="280" y1="170" x2="280" y2="195" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="600" y1="170" x2="600" y2="195" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="920" y1="170" x2="920" y2="195" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- Ingestion bar -->
  <rect x="170" y="195" width="860" height="36" rx="6" fill="url(#azureGrad)" opacity="0.9" filter="url(#shadow)"/>
  <text x="600" y="218" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700" letter-spacing="1">AZURE DATA FACTORY  —  ORCHESTRATION &amp; INGESTION</text>

  <!-- Arrow down from ADF -->
  <line x1="600" y1="231" x2="600" y2="258" stroke="#0078d4" stroke-width="2"/>
  <polygon points="595,255 605,255 600,263" fill="#0078d4"/>

  <!-- ═══════════ ADLS GEN2 CONTAINER ═══════════ -->
  <rect x="55" y="263" width="1090" height="360" rx="10" fill="none" stroke="#334155" stroke-width="1.5" stroke-dasharray="6"/>
  <rect x="55" y="263" width="310" height="28" rx="10" fill="#334155"/>
  <text x="72" y="282" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="2">AZURE DATA LAKE STORAGE GEN2</text>

  <!-- ─── BRONZE LAYER ─── -->
  <rect x="80" y="305" width="250" height="295" rx="10" fill="url(#bronzeGrad)" opacity="0.85" filter="url(#shadow)"/>
  <rect x="80" y="305" width="250" height="32" rx="10" fill="#b45309"/>
  <text x="205" y="326" text-anchor="middle" fill="#fef3c7" font-size="13" font-weight="700" letter-spacing="1">BRONZE — RAW</text>
  
  <rect x="96" y="350" width="218" height="40" rx="6" fill="#451a03" opacity="0.7"/>
  <text x="205" y="367" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600">Delta Tables (Append-Only)</text>
  <text x="205" y="382" text-anchor="middle" fill="#a3845c" font-size="9">Schema enforcement on read</text>

  <rect x="96" y="400" width="218" height="65" rx="6" fill="#451a03" opacity="0.5"/>
  <text x="205" y="418" text-anchor="middle" fill="#d4a574" font-size="10" font-weight="600">Metadata Columns</text>
  <text x="205" y="434" text-anchor="middle" fill="#92754a" font-size="9">_ingestion_timestamp</text>
  <text x="205" y="448" text-anchor="middle" fill="#92754a" font-size="9">_source_file · _batch_id</text>

  <rect x="96" y="475" width="218" height="50" rx="6" fill="#451a03" opacity="0.5"/>
  <text x="205" y="493" text-anchor="middle" fill="#d4a574" font-size="10" font-weight="600">Tables</text>
  <text x="205" y="510" text-anchor="middle" fill="#92754a" font-size="9">customers · products · orders</text>

  <rect x="96" y="540" width="218" height="44" rx="6" fill="#451a03" opacity="0.4"/>
  <text x="205" y="558" text-anchor="middle" fill="#d4a574" font-size="10" font-weight="600">PySpark + Databricks</text>
  <text x="205" y="574" text-anchor="middle" fill="#92754a" font-size="9">CSV / JSON / API ingestion</text>

  <!-- Arrow Bronze → Silver -->
  <line x1="330" y1="452" x2="378" y2="452" stroke="#f59e0b" stroke-width="2.5"/>
  <polygon points="375,447 375,457 385,452" fill="#f59e0b"/>

  <!-- ─── SILVER LAYER ─── -->
  <rect x="388" y="305" width="250" height="295" rx="10" fill="url(#silverGrad)" opacity="0.85" filter="url(#shadow)"/>
  <rect x="388" y="305" width="250" height="32" rx="10" fill="#64748b"/>
  <text x="513" y="326" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700" letter-spacing="1">SILVER — CLEANED</text>

  <rect x="404" y="350" width="218" height="40" rx="6" fill="#1e293b" opacity="0.7"/>
  <text x="513" y="367" text-anchor="middle" fill="#cbd5e1" font-size="10" font-weight="600">Delta Tables (Upsert)</text>
  <text x="513" y="382" text-anchor="middle" fill="#64748b" font-size="9">Schema enforcement on write</text>

  <rect x="404" y="400" width="218" height="65" rx="6" fill="#1e293b" opacity="0.5"/>
  <text x="513" y="418" text-anchor="middle" fill="#cbd5e1" font-size="10" font-weight="600">Transformations</text>
  <text x="513" y="434" text-anchor="middle" fill="#64748b" font-size="9">Type casting · Deduplication</text>
  <text x="513" y="448" text-anchor="middle" fill="#64748b" font-size="9">Null handling · Standardization</text>

  <rect x="404" y="475" width="218" height="50" rx="6" fill="#1e293b" opacity="0.5"/>
  <text x="513" y="493" text-anchor="middle" fill="#cbd5e1" font-size="10" font-weight="600">Derived Columns</text>
  <text x="513" y="510" text-anchor="middle" fill="#64748b" font-size="9">gross_revenue · net_revenue · margin</text>

  <rect x="404" y="540" width="218" height="44" rx="6" fill="#1e293b" opacity="0.4"/>
  <text x="513" y="558" text-anchor="middle" fill="#cbd5e1" font-size="10" font-weight="600">Quarantine Routing</text>
  <text x="513" y="574" text-anchor="middle" fill="#64748b" font-size="9">Bad records → quarantine layer</text>

  <!-- Arrow Silver → Gold -->
  <line x1="638" y1="452" x2="686" y2="452" stroke="#94a3b8" stroke-width="2.5"/>
  <polygon points="683,447 683,457 693,452" fill="#94a3b8"/>

  <!-- ─── GOLD LAYER ─── -->
  <rect x="696" y="305" width="250" height="295" rx="10" fill="url(#goldGrad)" opacity="0.85" filter="url(#shadow)"/>
  <rect x="696" y="305" width="250" height="32" rx="10" fill="#ca8a04"/>
  <text x="821" y="326" text-anchor="middle" fill="#fef9c3" font-size="13" font-weight="700" letter-spacing="1">GOLD — STAR SCHEMA</text>

  <rect x="712" y="350" width="218" height="55" rx="6" fill="#422006" opacity="0.7"/>
  <text x="821" y="368" text-anchor="middle" fill="#fde68a" font-size="10" font-weight="600">Dimension Tables (SCD Type 2)</text>
  <text x="821" y="384" text-anchor="middle" fill="#a18249" font-size="9">dim_customer · dim_product</text>
  <text x="821" y="397" text-anchor="middle" fill="#a18249" font-size="9">is_current · scd_start/end_date</text>

  <rect x="712" y="415" width="218" height="40" rx="6" fill="#422006" opacity="0.5"/>
  <text x="821" y="432" text-anchor="middle" fill="#fde68a" font-size="10" font-weight="600">Calendar Dimension</text>
  <text x="821" y="447" text-anchor="middle" fill="#a18249" font-size="9">dim_date (generated 2023–2025)</text>

  <rect x="712" y="465" width="218" height="52" rx="6" fill="#422006" opacity="0.5"/>
  <text x="821" y="483" text-anchor="middle" fill="#fde68a" font-size="10" font-weight="600">Fact Table</text>
  <text x="821" y="498" text-anchor="middle" fill="#a18249" font-size="9">fact_orders (surrogate keys)</text>
  <text x="821" y="511" text-anchor="middle" fill="#a18249" font-size="9">date_key · customer_key · product_key</text>

  <rect x="712" y="528" width="218" height="58" rx="6" fill="#422006" opacity="0.4"/>
  <text x="821" y="546" text-anchor="middle" fill="#fde68a" font-size="10" font-weight="600">Change Detection</text>
  <text x="821" y="562" text-anchor="middle" fill="#a18249" font-size="9">SHA-256 hash comparison</text>
  <text x="821" y="576" text-anchor="middle" fill="#a18249" font-size="9">Expire old → Insert new version</text>

  <!-- ─── QUALITY GATE (between Silver → Gold) ─── -->
  <rect x="960" y="340" width="170" height="255" rx="10" fill="url(#qualityGrad)" opacity="0.85" filter="url(#shadow)"/>
  <rect x="960" y="340" width="170" height="30" rx="10" fill="#15803d"/>
  <text x="1045" y="360" text-anchor="middle" fill="#bbf7d0" font-size="11" font-weight="700" letter-spacing="1">QUALITY GATE</text>

  <text x="1045" y="390" text-anchor="middle" fill="#86efac" font-size="9" font-weight="600">NOT NULL CHECKS</text>
  <text x="1045" y="410" text-anchor="middle" fill="#86efac" font-size="9" font-weight="600">UNIQUENESS</text>
  <text x="1045" y="430" text-anchor="middle" fill="#86efac" font-size="9" font-weight="600">REFERENTIAL INTEGRITY</text>
  <text x="1045" y="450" text-anchor="middle" fill="#86efac" font-size="9" font-weight="600">VALUE RANGES</text>
  <text x="1045" y="470" text-anchor="middle" fill="#86efac" font-size="9" font-weight="600">DATE VALIDATION</text>
  <text x="1045" y="490" text-anchor="middle" fill="#86efac" font-size="9" font-weight="600">FRESHNESS</text>
  
  <line x1="975" y1="510" x2="1115" y2="510" stroke="#22c55e" stroke-width="0.5" opacity="0.4"/>
  <text x="1045" y="530" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="700">CRITICAL → BLOCK</text>
  <text x="1045" y="548" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="700">WARNING → ALERT</text>
  
  <text x="1045" y="575" text-anchor="middle" fill="#6ee7b7" font-size="9">Great Expectations</text>
  <text x="1045" y="588" text-anchor="middle" fill="#6ee7b7" font-size="9">Custom Validators</text>

  <!-- Arrow from Silver to Quality Gate -->
  <line x1="638" y1="380" x2="680" y2="380" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3"/>
  <line x1="680" y1="380" x2="680" y2="310" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3"/>
  <line x1="680" y1="310" x2="1045" y2="310" stroke="#22c55e" stroke-width="1" stroke-dasharray="3"/>
  <line x1="1045" y1="310" x2="1045" y2="340" stroke="#22c55e" stroke-width="1.5"/>
  <polygon points="1040,337 1050,337 1045,345" fill="#22c55e"/>

  <!-- ═══════════ BOTTOM LAYER — SERVING ═══════════ -->
  <text x="600" y="650" text-anchor="middle" fill="#64748b" font-size="11" font-weight="600" letter-spacing="3">SERVING LAYER</text>

  <!-- Power BI -->
  <rect x="120" y="665" width="195" height="55" rx="8" fill="#1e3a5f" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="217" y="689" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="700">Power BI</text>
  <text x="217" y="706" text-anchor="middle" fill="#64748b" font-size="9">Dashboards &amp; Analytics</text>

  <!-- Azure Synapse -->
  <rect x="370" y="665" width="195" height="55" rx="8" fill="#1e3a5f" stroke="#0078d4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="467" y="689" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="700">Azure Synapse</text>
  <text x="467" y="706" text-anchor="middle" fill="#64748b" font-size="9">Serverless SQL Queries</text>

  <!-- ML Serving -->
  <rect x="620" y="665" width="195" height="55" rx="8" fill="#1e3a5f" stroke="#a78bfa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="717" y="689" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="700">ML Serving</text>
  <text x="717" y="706" text-anchor="middle" fill="#64748b" font-size="9">Feature Store &amp; Models</text>

  <!-- CI/CD -->
  <rect x="870" y="665" width="195" height="55" rx="8" fill="url(#cicdGrad)" opacity="0.85" filter="url(#shadow)"/>
  <text x="967" y="689" text-anchor="middle" fill="#e9d5ff" font-size="12" font-weight="700">Azure DevOps CI/CD</text>
  <text x="967" y="706" text-anchor="middle" fill="#a78bfa" font-size="9">Lint → Test → Build → Deploy</text>

  <!-- Arrows from Gold down to serving -->
  <line x1="760" y1="600" x2="760" y2="632" stroke="#ca8a04" stroke-width="1.5"/>
  <line x1="217" y1="632" x2="967" y2="632" stroke="#475569" stroke-width="1" stroke-dasharray="4"/>
  <line x1="217" y1="632" x2="217" y2="665" stroke="#475569" stroke-width="1.5"/>
  <line x1="467" y1="632" x2="467" y2="665" stroke="#475569" stroke-width="1.5"/>
  <line x1="717" y1="632" x2="717" y2="665" stroke="#475569" stroke-width="1.5"/>
  <line x1="967" y1="632" x2="967" y2="665" stroke="#475569" stroke-width="1.5"/>

  <!-- ═══════════ INFRASTRUCTURE BAR (bottom) ═══════════ -->
  <rect x="80" y="745" width="1040" height="48" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="600" y="764" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="2">INFRASTRUCTURE AS CODE</text>
  <text x="600" y="782" text-anchor="middle" fill="#64748b" font-size="10">Terraform (ADLS · Databricks · Key Vault · ADF)  ·  Azure DevOps Pipeline (Lint · pytest · Deploy)  ·  Delta Lake  ·  Git</text>

  <!-- ═══════════ TECH BADGES ═══════════ -->
  <rect x="80" y="800" width="68" height="17" rx="3" fill="#ef4444" opacity="0.8"/>
  <text x="114" y="812" text-anchor="middle" fill="#fff" font-size="8" font-weight="600">Databricks</text>
  
  <rect x="155" y="800" width="58" height="17" rx="3" fill="#3b82f6" opacity="0.8"/>
  <text x="184" y="812" text-anchor="middle" fill="#fff" font-size="8" font-weight="600">PySpark</text>

  <rect x="220" y="800" width="48" height="17" rx="3" fill="#0078d4" opacity="0.8"/>
  <text x="244" y="812" text-anchor="middle" fill="#fff" font-size="8" font-weight="600">Azure</text>

  <rect x="275" y="800" width="68" height="17" rx="3" fill="#059669" opacity="0.8"/>
  <text x="309" y="812" text-anchor="middle" fill="#fff" font-size="8" font-weight="600">Delta Lake</text>

  <rect x="350" y="800" width="38" height="17" rx="3" fill="#eab308" opacity="0.8"/>
  <text x="369" y="812" text-anchor="middle" fill="#000" font-size="8" font-weight="600">SQL</text>

  <rect x="395" y="800" width="55" height="17" rx="3" fill="#8b5cf6" opacity="0.8"/>
  <text x="422" y="812" text-anchor="middle" fill="#fff" font-size="8" font-weight="600">pytest</text>

  <rect x="457" y="800" width="62" height="17" rx="3" fill="#6366f1" opacity="0.8"/>
  <text x="488" y="812" text-anchor="middle" fill="#fff" font-size="8" font-weight="600">Terraform</text>

  <rect x="526" y="800" width="58" height="17" rx="3" fill="#f97316" opacity="0.8"/>
  <text x="555" y="812" text-anchor="middle" fill="#fff" font-size="8" font-weight="600">CI/CD</text>
</svg>
